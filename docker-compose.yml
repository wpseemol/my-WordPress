services:
     composer:
          image: composer
          command: update
          volumes:
               - ./wp:/app

     mysql:
          image: mysql:8.0
          volumes:
               - mysql_data:/var/lib/mysql
               - ./mysql:/var/lib/mysql
          restart: always
          environment:
               MYSQL_ROOT_PASSWORD: root
               MYSQL_DATABASE: wordpress
               MYSQL_USER: wordpress
               MYSQL_PASSWORD: wordpress

     phpmyadmin:
          image: phpmyadmin
          container_name: phpmyadmin
          environment:
               PMA_HOST: mysql
               PMA_PORT: 3306
          ports:
               - 8183:80
          depends_on:
               - mysql

     wordpress:
          depends_on:
               - mysql
               - composer
          build: ./php
          image: wordpress:latest
          ports:
               - "8080:80"
          restart: always
          environment:
               WORDPRESS_DB_HOST: mysql:3306
               WORDPRESS_DB_USER: wordpress
               WORDPRESS_DB_PASSWORD: wordpress
               WORDPRESS_DB_NAME: wordpress
          volumes:
               - ./wp:/var/www/html

volumes:
     mysql_data: {}
